<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#10131f" />
  <meta name="description" content="1분 안에 초성/알파벳 단어를 최대한 많이 맞히는 두뇌 테스트 게임" />
  <title>1분 단어 두뇌 테스트</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    :root { color-scheme: dark; --safe-bottom: env(safe-area-inset-bottom, 0px); }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      min-height: 100dvh;
      margin: 0;
      overflow-x: hidden;
      background:
        radial-gradient(circle at top left, rgba(20, 184, 166, 0.22), transparent 28rem),
        radial-gradient(circle at bottom right, rgba(244, 114, 182, 0.18), transparent 28rem),
        linear-gradient(145deg, #10131f 0%, #181923 48%, #10131f 100%);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .mission-glow { text-shadow: 0 0 42px rgba(45, 212, 191, 0.55), 0 8px 0 rgba(255, 255, 255, 0.08); }
    .glass { background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.12); box-shadow: 0 20px 70px rgba(0, 0, 0, 0.28); backdrop-filter: blur(22px); }
    .shake { animation: shake 0.28s cubic-bezier(.36,.07,.19,.97) both; }
    @keyframes shake { 10%, 90% { transform: translateX(-2px); } 20%, 80% { transform: translateX(4px); } 30%, 50%, 70% { transform: translateX(-8px); } 40%, 60% { transform: translateX(8px); } }
    .pulse-pop { animation: pulse-pop 0.22s ease-out; }
    @keyframes pulse-pop { 0% { transform: scale(1); } 55% { transform: scale(1.14); } 100% { transform: scale(1); } }
    .ad-slot { display: grid; place-items: center; color: rgba(255, 255, 255, 0.56); border: 1px dashed rgba(255, 255, 255, 0.26); background: linear-gradient(135deg, rgba(255, 255, 255, 0.07), rgba(255, 255, 255, 0.03)); }
    .goal-card { position: relative; overflow: hidden; border-color: rgba(251, 191, 36, 0.34); background: linear-gradient(135deg, rgba(251, 191, 36, 0.2), rgba(20, 184, 166, 0.12), rgba(244, 63, 94, 0.13)), rgba(255, 255, 255, 0.08); box-shadow: 0 20px 70px rgba(251, 191, 36, 0.16), inset 0 0 0 1px rgba(255, 255, 255, 0.06); }
    .goal-card::before { content: ""; position: absolute; inset: -45% auto auto -20%; width: 70%; aspect-ratio: 1; background: rgba(251, 191, 36, 0.18); filter: blur(28px); transform: rotate(18deg); }
    .danger-pulse { animation: danger-pulse 1.5s ease-in-out infinite; }
    @keyframes danger-pulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(251, 191, 36, 0.4); } 50% { box-shadow: 0 0 0 8px rgba(251, 191, 36, 0); } }
    .bottom-input-shell { padding-bottom: calc(0.9rem + var(--safe-bottom)); }
  </style>
</head>
<body class="text-white">
  <main class="mx-auto flex min-h-dvh w-full max-w-5xl flex-col px-4 pb-32 pt-4 sm:px-6 lg:px-8">
    <header class="flex items-center justify-between gap-3">
      <div>
        <p id="eyebrow" class="text-xs font-bold uppercase tracking-[0.18em] text-teal-200/80">60-second brain sprint</p>
        <h1 id="title" class="mt-1 text-xl font-black sm:text-2xl">1분 초성 단어 두뇌 테스트</h1>
      </div>
      <div class="glass flex shrink-0 rounded-full p-1">
        <button id="korBtn" type="button" class="rounded-full px-4 py-2 text-sm font-black transition">KR</button>
        <button id="engBtn" type="button" class="rounded-full px-4 py-2 text-sm font-black transition">EN</button>
      </div>
    </header>

    <section class="grid flex-1 place-items-center py-6 sm:py-8">
      <div class="w-full">
        <div class="mx-auto grid max-w-3xl gap-4 sm:grid-cols-3">
          <div class="glass rounded-2xl p-4 text-center">
            <p id="timerLabel" class="text-xs font-bold uppercase text-white/50">Time</p>
            <p id="timer" class="mt-1 text-4xl font-black tabular-nums">60</p>
          </div>
          <div class="glass rounded-2xl p-4 text-center">
            <p id="scoreLabel" class="text-xs font-bold uppercase text-white/50">Score</p>
            <p id="score" class="mt-1 text-4xl font-black tabular-nums text-teal-200">0</p>
          </div>
          <div class="glass goal-card rounded-2xl p-4 text-center">
            <p id="goalLabel" class="text-xs font-bold uppercase text-white/50">Goal</p>
            <div class="relative">
              <p id="goalCount" class="mt-1 text-4xl font-black tabular-nums text-amber-200 danger-pulse">20+</p>
              <p id="goalWarning" class="mx-auto mt-2 max-w-[14rem] text-xs font-black leading-snug text-amber-50 sm:text-[13px]">
                건강한 성인의 경우 1분 동안 보통 20~25개 이상의 단어를 떠올리는 것이 정상입니다.
              </p>
            </div>
          </div>
        </div>

        <div class="mt-7 text-center sm:mt-10">
          <p id="missionLabel" class="text-sm font-bold uppercase tracking-[0.18em] text-white/50">Current mission</p>
          <div id="missionLetter" class="mission-glow mt-2 text-[9rem] font-black leading-none text-white sm:text-[13rem]">ㅇ</div>
          <p id="hint" class="mx-auto mt-2 max-w-xl text-balance text-sm font-semibold text-white/64 sm:text-base">
            ㅇ으로 시작하는 명사를 최대한 빠르게 입력하세요.
          </p>
          <button id="startBtn" type="button" class="mt-6 rounded-full bg-teal-300 px-8 py-4 text-base font-black text-slate-950 shadow-[0_14px_35px_rgba(45,212,191,0.32)] transition hover:bg-teal-200 active:scale-95 sm:text-lg">
            시작하기
          </button>
          <p id="feedback" class="mt-4 min-h-6 text-sm font-bold text-white/70" aria-live="polite"></p>
        </div>

        <aside class="ad-slot mx-auto mt-7 h-24 w-full max-w-3xl rounded-2xl text-sm font-bold sm:h-28" data-ad-slot="game-bottom">
          광고 배너 영역 728x90 / 모바일 320x100
        </aside>
      </div>
    </section>
  </main>

  <form id="answerForm" class="bottom-input-shell fixed inset-x-0 bottom-0 z-30 border-t border-white/10 bg-[#10131f]/92 px-4 pt-3 backdrop-blur-xl sm:px-6">
    <div class="mx-auto flex max-w-3xl items-center gap-3">
      <input id="answerInput" type="text" inputmode="text" autocomplete="off" autocapitalize="none" spellcheck="false" disabled class="h-14 min-w-0 flex-1 rounded-2xl border border-white/14 bg-white px-5 text-lg font-black text-slate-950 outline-none transition placeholder:text-slate-400 focus:border-teal-300 focus:ring-4 focus:ring-teal-300/25 disabled:cursor-not-allowed disabled:bg-white/55 sm:h-16 sm:text-xl" placeholder="시작 후 단어 입력" />
      <button id="submitBtn" type="submit" disabled class="grid h-14 w-14 shrink-0 place-items-center rounded-2xl bg-pink-400 text-xl font-black text-slate-950 transition active:scale-95 disabled:cursor-not-allowed disabled:bg-white/20 disabled:text-white/35 sm:h-16 sm:w-16" aria-label="submit answer">↵</button>
    </div>
  </form>

  <div id="resultModal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/70 px-4 py-6 backdrop-blur-sm" role="dialog" aria-modal="true" aria-labelledby="resultTitle">
    <section class="glass max-h-[92dvh] w-full max-w-md overflow-y-auto rounded-3xl p-5 text-center sm:p-7">
      <p id="resultBadge" class="mx-auto grid h-14 w-14 place-items-center rounded-full bg-white/10 text-3xl">🎉</p>
      <h2 id="resultTitle" class="mt-4 text-2xl font-black">결과</h2>
      <p id="resultScore" class="mt-2 text-5xl font-black tabular-nums text-teal-200">0</p>
      <p id="resultTier" class="mt-2 text-lg font-black text-amber-200"></p>
      <p id="resultMessage" class="mt-3 text-base font-bold leading-relaxed text-white/86"></p>
      <p id="resultGuide" class="mt-3 text-sm font-semibold leading-relaxed text-white/64"></p>
      <aside class="ad-slot mx-auto my-5 aspect-square w-full max-w-[280px] rounded-2xl text-sm font-bold" data-ad-slot="result-modal">광고 배너 영역 300x250</aside>
      <div class="grid gap-3">
        <button id="shareBtn" type="button" class="rounded-2xl bg-yellow-300 px-5 py-4 font-black text-slate-950 transition active:scale-95">카카오톡으로 결과 공유</button>
        <button id="copyBtn" type="button" class="rounded-2xl bg-white px-5 py-4 font-black text-slate-950 transition active:scale-95">링크 복사하기</button>
        <button id="retryBtn" type="button" class="rounded-2xl border border-white/15 px-5 py-4 font-black text-white transition active:scale-95">다시 도전</button>
      </div>
    </section>
  </div>

  <script>
    const DATA_FILES = {
      korCsv: "chosung_nouns_perfect.csv",
      korXlsx: "국립국어원_초성별_단어_진짜최종.xlsx",
      engXlsx: "영어_WordNet_명사_단어장.xlsx"
    };

    const KOR_INITIALS = ["ㄱ", "ㄲ", "ㄴ", "ㄷ", "ㄸ", "ㄹ", "ㅁ", "ㅂ", "ㅃ", "ㅅ", "ㅆ", "ㅇ", "ㅈ", "ㅉ", "ㅊ", "ㅋ", "ㅌ", "ㅍ", "ㅎ"];

    const FALLBACK_WORD_DATA = {
      kor: {
        "ㅇ": ["아버지", "어머니", "우산", "아기", "오이", "아이", "오리", "우유", "의자", "이불", "여행", "음악", "영화", "연필", "일기", "아침", "여름", "얼음", "우주", "연못"],
        "ㄱ": ["가방", "가위", "가족", "가게", "가지", "감자", "고양이", "강아지", "기차", "거울", "건물", "공원", "공책", "국수", "구름", "그림", "김치", "꿈", "꽃", "계절"],
        "ㅅ": ["사과", "사람", "사전", "사진", "사탕", "산책", "상자", "생각", "선물", "설탕", "소금", "소리", "소설", "수건", "수박", "시간", "시계", "신문", "식당", "신발"]
      },
      eng: {
        f: ["face", "fact", "fail", "fair", "fall", "family", "farm", "father", "field", "fight", "file", "film", "finger", "fire", "fish", "flag", "floor", "flower", "food", "friend"],
        a: ["able", "about", "above", "actor", "adult", "after", "agent", "alarm", "album", "alive", "alone", "angel", "animal", "answer", "apple", "area", "arrow", "artist", "asset", "audio"],
        s: ["safe", "salad", "salt", "sand", "school", "score", "screen", "season", "secret", "sense", "shadow", "shape", "share", "shirt", "skill", "sleep", "smile", "sound", "space", "story"]
      }
    };

    let WORD_DATA = structuredClone(FALLBACK_WORD_DATA);
    let MISSIONS = buildMissions(WORD_DATA);

    const RESULT_TIERS = {
      kor: [
        { min: 26, badge: "🚀", name: "SUPER GREEN · 갓벽한 브레인 스프린터", hook: "뇌 활성도 최상위 등급! 당신의 뇌는 지금 가장 젊습니다.", guide: "1분이라는 짧은 시간 동안 폭발적인 인출 속도를 보여주셨습니다. 평소 독서나 깊은 사고를 자주 하시는 분이 분명하네요." },
        { min: 20, badge: "🎉", name: "GREEN · 정상 (건강함)", hook: "전두엽과 측두엽의 완벽한 티키타카! 매우 건강합니다.", guide: "뇌에 저장된 정보를 빠르고 정확하게 꺼내 쓰고 계시네요. 정보 탐색과 집행 기능이 모두 안정적인 상태입니다." },
        { min: 16, badge: "⚡", name: "YELLOW · 주의 (로딩 중)", hook: "단어는 머릿속에 맴도는데... 전두엽 로딩 중!", guide: "어휘력은 충분하지만, 뇌에서 꺼내는 속도가 살짝 지연되고 있어요. 일상 대화에서 익숙한 단어 대신 새로운 표현을 섞어 써보세요." },
        { min: 0, badge: "⚠️", name: "RED · 경고 (위험)", hook: "혹시 브레인 롯(Brain Rot)? 뇌의 출력이 잠시 녹슨 상태!", guide: "뇌세포 노화라기보다는 스마트폰이나 숏폼 중독으로 뇌의 인출 기능이 둔해졌을 가능성이 큽니다. 지금 바로 책을 펼치거나 소리 내어 읽어보세요." }
      ],
      eng: [
        { min: 23, badge: "🚀", name: "SUPER GREEN · Elite Brain Sprinter", hook: "Top-tier cognitive speed! Your brain is at its absolute prime.", guide: "You showed explosive word-retrieval speed. It is clear that you frequently engage in reading or deep intellectual activities. Excellent job!" },
        { min: 17, badge: "🎉", name: "GREEN · Healthy & Sharp", hook: "Perfect harmony between your frontal & temporal lobes!", guide: "Your brain accesses and retrieves stored information with impressive agility. Your executive functions are stable and healthy." },
        { min: 13, badge: "⚡", name: "YELLOW · Brain Buffering", hook: "Word on the tip of your tongue? Frontal lobe is buffering!", guide: "Your vocabulary is fine, but the output speed is slightly lagging. Try introducing new words into daily conversations to boost processing speed." },
        { min: 0, badge: "⚠️", name: "RED · Brain Rot Alert", hook: "Uh-oh... Brain Rot Alert? Your brain's output is temporarily rusty!", guide: "Scoring under 13 might mean doomscrolling or short-form content has slowed down recall. Turn off the screen, open a book, and wake your brain up!" }
      ]
    };

    const UI_TEXT = {
      kor: { htmlLang: "ko", title: "1분 초성 단어 두뇌 테스트", eyebrow: "60-second brain sprint", missionLabel: "Current mission", hint: "{mission}으로 시작하는 명사를 최대한 빠르게 입력하세요.", timerLabel: "Time", scoreLabel: "Score", goalLabel: "GOAL (권장)", goalWarning: "건강한 성인의 경우 1분 동안 보통 20~25개 이상의 단어를 떠올리는 것이 정상입니다.", start: "시작하기", restart: "다시 시작", loading: "단어장 불러오는 중...", placeholderReady: "시작 후 단어 입력", placeholderPlay: "단어 입력 후 Enter", correct: "좋아요. 바로 다음 단어!", wrong: "사전에 없는 단어예요.", duplicate: "이미 맞춘 단어예요.", idle: "시작 버튼을 누르면 60초가 흐릅니다.", dataLoaded: "단어장을 불러왔습니다.", dataFallback: "일부 단어장 파일을 읽지 못해 기본 단어장을 함께 사용합니다.", share: "카카오톡으로 결과 공유", copy: "링크 복사하기", retry: "다시 도전", resultTitle: "결과", copied: "링크를 복사했습니다.", success: "🎉 천재적인 두뇌입니다! 당신의 놀라운 집중력을 친구들에게 자랑해보세요.", fail: "⚠️ 경고: 현재 뇌 기능이 일시적으로 저하되어 있을 가능성이 있습니다! 절대적인 휴식이 필요합니다." },
      eng: { htmlLang: "en", title: "1-Minute Alphabet Word Brain Test", eyebrow: "60-second brain sprint", missionLabel: "Current mission", hint: "Type words starting with '{mission}'. Based on the F-A-S Test.", timerLabel: "Time", scoreLabel: "Score", goalLabel: "GOAL (Recommended)", goalWarning: "F-A-S Test inspired target: 17+ words in 1 minute reflects a healthy recall sprint.", start: "Start", restart: "Restart", loading: "Loading word dataset...", placeholderReady: "Start, then type words", placeholderPlay: "Type a word and press Enter", correct: "Nice. Next word!", wrong: "Not in the word list.", duplicate: "Already counted.", idle: "Press start. You get 60 seconds.", dataLoaded: "Word datasets loaded.", dataFallback: "Some dataset files could not be read, so fallback words are also enabled.", share: "Share Result", copy: "Copy Link", retry: "Try Again", resultTitle: "Result", copied: "Link copied.", success: "🎉 Genius focus. Brag about your score before your friends catch up.", fail: "⚠️ Warning: Your brain function may be temporarily underclocked. Emergency rest is strongly recommended." }
    };

    const state = {
      lang: getInitialLanguage(),
      timeLeft: 60,
      score: 0,
      running: false,
      dataReady: false,
      timerId: null,
      currentMission: null,
      answered: new Set(),
      wordSets: buildWordSets(WORD_DATA)
    };

    const $ = (id) => document.getElementById(id);
    const nodes = {
      korBtn: $("korBtn"), engBtn: $("engBtn"), eyebrow: $("eyebrow"), title: $("title"), missionLabel: $("missionLabel"), missionLetter: $("missionLetter"), hint: $("hint"), timerLabel: $("timerLabel"), scoreLabel: $("scoreLabel"), goalLabel: $("goalLabel"), goalCount: $("goalCount"), goalWarning: $("goalWarning"), timer: $("timer"), score: $("score"), startBtn: $("startBtn"), feedback: $("feedback"), answerForm: $("answerForm"), answerInput: $("answerInput"), submitBtn: $("submitBtn"), resultModal: $("resultModal"), resultBadge: $("resultBadge"), resultTitle: $("resultTitle"), resultScore: $("resultScore"), resultTier: $("resultTier"), resultMessage: $("resultMessage"), resultGuide: $("resultGuide"), shareBtn: $("shareBtn"), copyBtn: $("copyBtn"), retryBtn: $("retryBtn")
    };

    function getInitialLanguage() {
      const params = new URLSearchParams(window.location.search);
      return params.get("lang") === "eng" ? "eng" : "kor";
    }

    function getKorInitial(word) {
      const code = word.charCodeAt(0) - 44032;
      if (code < 0 || code > 11171) return "";
      return KOR_INITIALS[Math.floor(code / 588)];
    }

    function cleanWord(value, lang) {
      const raw = String(value ?? "").trim();
      if (!raw || /^(word|words|noun|nouns|단어|명사|초성|chosung|alphabet|letter)$/i.test(raw)) return "";
      if (lang === "eng") {
        const word = raw.toLowerCase().replace(/[^a-z'-]/g, "").replace(/^[-']+|[-']+$/g, "");
        return /^[a-z][a-z'-]{1,}$/.test(word) ? word : "";
      }
      const word = raw.replace(/\s+/g, "");
      return /^[가-힣]{2,}$/.test(word) ? word : "";
    }

    function addWord(target, lang, word, initial = null) {
      const clean = cleanWord(word, lang);
      if (!clean) return;
      const key = lang === "eng" ? clean[0] : (initial || getKorInitial(clean));
      if (!key) return;
      if (!target[key]) target[key] = [];
      target[key].push(clean);
    }

    function dedupeGroups(groups) {
      return Object.fromEntries(Object.entries(groups).map(([key, words]) => [key, [...new Set(words)].sort((a, b) => a.localeCompare(b))]));
    }

    function buildWordSets(data) {
      return {
        kor: Object.fromEntries(Object.entries(data.kor).map(([mission, words]) => [mission, new Set(words)])),
        eng: Object.fromEntries(Object.entries(data.eng).map(([mission, words]) => [mission, new Set(words)]))
      };
    }

    function buildMissions(data) {
      const kor = Object.keys(data.kor).filter((key) => data.kor[key].length >= 5);
      const engKeys = Object.keys(data.eng).filter((key) => data.eng[key].length >= 5);
      const fas = ["f", "a", "s"].filter((key) => engKeys.includes(key));
      return { kor: kor.length ? kor : ["ㅇ", "ㄱ", "ㅅ"], eng: fas.length === 3 ? fas : (engKeys.length ? engKeys : ["f", "a", "s"]) };
    }

    function parseCsv(text) {
      const groups = {};
      text.replace(/^\uFEFF/, "").split(/\r?\n/).slice(1).forEach((line) => {
        if (!line.trim()) return;
        const [initial, ...rest] = line.split(",");
        addWord(groups, "kor", rest.join(","), initial.trim());
      });
      return dedupeGroups(groups);
    }

    async function readTextFile(path) {
      const response = await fetch(encodeURI(path));
      if (!response.ok) throw new Error(`${path} ${response.status}`);
      return response.text();
    }

    async function readXlsxFile(path, lang) {
      if (!window.XLSX) throw new Error("SheetJS is not loaded");
      const response = await fetch(encodeURI(path));
      if (!response.ok) throw new Error(`${path} ${response.status}`);
      const buffer = await response.arrayBuffer();
      const workbook = XLSX.read(buffer, { type: "array" });
      const groups = {};
      workbook.SheetNames.forEach((sheetName) => {
        const rows = XLSX.utils.sheet_to_json(workbook.Sheets[sheetName], { header: 1, raw: false, blankrows: false });
        rows.flat().forEach((cell) => addWord(groups, lang, cell));
      });
      return dedupeGroups(groups);
    }

    function mergeWordData(base, addition, lang) {
      Object.entries(addition).forEach(([key, words]) => {
        if (!base[lang][key]) base[lang][key] = [];
        base[lang][key].push(...words);
      });
      base[lang] = dedupeGroups(base[lang]);
    }

    async function loadWordData() {
      const loaded = structuredClone(FALLBACK_WORD_DATA);
      let loadedAny = false;
      let failedAny = false;

      const jobs = [
        readTextFile(DATA_FILES.korCsv).then((text) => { mergeWordData(loaded, parseCsv(text), "kor"); loadedAny = true; }).catch(() => { failedAny = true; }),
        readXlsxFile(DATA_FILES.korXlsx, "kor").then((groups) => { mergeWordData(loaded, groups, "kor"); loadedAny = true; }).catch(() => { failedAny = true; }),
        readXlsxFile(DATA_FILES.engXlsx, "eng").then((groups) => { mergeWordData(loaded, groups, "eng"); loadedAny = true; }).catch(() => { failedAny = true; })
      ];

      await Promise.allSettled(jobs);
      WORD_DATA = loaded;
      MISSIONS = buildMissions(WORD_DATA);
      state.wordSets = buildWordSets(WORD_DATA);
      state.dataReady = true;
      resetGame(false);
      nodes.feedback.textContent = loadedAny && !failedAny ? UI_TEXT[state.lang].dataLoaded : UI_TEXT[state.lang].dataFallback;
      render();
    }

    function pickMission(lang) {
      const missions = MISSIONS[lang];
      return missions[Math.floor(Math.random() * missions.length)];
    }

    function getGoalCount(lang) { return lang === "eng" ? 17 : 20; }
    function getResultTier(lang, score) { return RESULT_TIERS[lang].find((tier) => score >= tier.min); }
    function normalizeAnswer(value) { return state.lang === "eng" ? value.trim().toLowerCase() : value.trim().replace(/\s+/g, ""); }

    function validateAnswer(rawValue) {
      const answer = normalizeAnswer(rawValue);
      if (!answer) return { ok: false, reason: "wrong" };
      if (state.lang === "eng" && (!/^[a-z'-]+$/.test(answer) || !answer.startsWith(state.currentMission))) return { ok: false, reason: "wrong" };
      if (state.lang === "kor" && (!/^[가-힣]+$/.test(answer) || getKorInitial(answer) !== state.currentMission)) return { ok: false, reason: "wrong" };
      if (state.answered.has(answer)) return { ok: false, reason: "duplicate" };
      if (!state.wordSets[state.lang][state.currentMission]?.has(answer)) return { ok: false, reason: "wrong" };
      return { ok: true, answer };
    }

    function setLanguage(lang, updateUrl = true) {
      state.lang = lang;
      if (updateUrl) {
        const url = new URL(window.location.href);
        url.searchParams.set("lang", lang);
        window.history.replaceState({}, "", url);
      }
      resetGame(false);
      render();
    }

    function render() {
      const text = UI_TEXT[state.lang];
      if (!state.currentMission) state.currentMission = pickMission(state.lang);
      document.documentElement.lang = text.htmlLang;
      document.title = text.title;
      nodes.eyebrow.textContent = text.eyebrow;
      nodes.title.textContent = text.title;
      nodes.missionLabel.textContent = text.missionLabel;
      nodes.missionLetter.textContent = state.currentMission.toUpperCase();
      nodes.hint.textContent = text.hint.replace("{mission}", state.currentMission.toUpperCase());
      nodes.timerLabel.textContent = text.timerLabel;
      nodes.scoreLabel.textContent = text.scoreLabel;
      nodes.goalLabel.textContent = text.goalLabel;
      nodes.goalCount.textContent = `${getGoalCount(state.lang)}+`;
      nodes.goalWarning.textContent = text.goalWarning;
      nodes.timer.textContent = state.timeLeft;
      nodes.score.textContent = state.score;
      nodes.startBtn.textContent = state.dataReady ? (state.running || state.score > 0 || state.timeLeft < 60 ? text.restart : text.start) : text.loading;
      nodes.startBtn.disabled = !state.dataReady;
      nodes.answerInput.placeholder = state.running ? text.placeholderPlay : text.placeholderReady;
      nodes.answerInput.disabled = !state.running;
      nodes.submitBtn.disabled = !state.running;
      nodes.shareBtn.textContent = text.share;
      nodes.copyBtn.textContent = text.copy;
      nodes.retryBtn.textContent = text.retry;
      nodes.resultTitle.textContent = text.resultTitle;
      nodes.korBtn.className = langButtonClass(state.lang === "kor");
      nodes.engBtn.className = langButtonClass(state.lang === "eng");
    }

    function langButtonClass(active) { return `rounded-full px-4 py-2 text-sm font-black transition ${active ? "bg-white text-slate-950" : "text-white/58 hover:text-white"}`; }

    function resetGame(clearFeedback = true) {
      stopTimer();
      state.timeLeft = 60;
      state.score = 0;
      state.running = false;
      state.currentMission = pickMission(state.lang);
      state.answered.clear();
      nodes.answerInput.value = "";
      nodes.resultModal.classList.add("hidden");
      nodes.resultModal.classList.remove("flex");
      if (clearFeedback) nodes.feedback.textContent = state.dataReady ? UI_TEXT[state.lang].idle : UI_TEXT[state.lang].loading;
    }

    function startGame() {
      if (!state.dataReady) return;
      resetGame(false);
      state.currentMission = pickMission(state.lang);
      state.running = true;
      nodes.feedback.textContent = UI_TEXT[state.lang].idle;
      render();
      requestAnimationFrame(() => nodes.answerInput.focus({ preventScroll: true }));
      const endsAt = Date.now() + 60000;
      state.timerId = window.setInterval(() => {
        state.timeLeft = Math.max(0, Math.ceil((endsAt - Date.now()) / 1000));
        nodes.timer.textContent = state.timeLeft;
        if (state.timeLeft <= 0) finishGame();
      }, 160);
    }

    function stopTimer() { if (state.timerId) window.clearInterval(state.timerId); state.timerId = null; }
    function finishGame() { stopTimer(); state.running = false; state.timeLeft = 0; render(); showResult(); }

    function showResult() {
      const tier = getResultTier(state.lang, state.score);
      nodes.resultBadge.textContent = tier.badge;
      nodes.resultScore.textContent = `${state.score} / ${getGoalCount(state.lang)}`;
      nodes.resultTier.textContent = tier.name;
      nodes.resultMessage.textContent = tier.hook;
      nodes.resultGuide.textContent = tier.guide;
      nodes.resultModal.classList.remove("hidden");
      nodes.resultModal.classList.add("flex");
    }

    function handleAnswerSubmit(event) {
      event.preventDefault();
      if (!state.running) return;
      const result = validateAnswer(nodes.answerInput.value);
      nodes.answerInput.value = "";
      if (!result.ok) { rejectInput(result.reason); return; }
      state.answered.add(result.answer);
      state.score += 1;
      nodes.score.textContent = state.score;
      nodes.score.classList.remove("pulse-pop");
      void nodes.score.offsetWidth;
      nodes.score.classList.add("pulse-pop");
      nodes.feedback.textContent = UI_TEXT[state.lang].correct;
    }

    function rejectInput(reason) {
      nodes.answerInput.classList.remove("shake");
      void nodes.answerInput.offsetWidth;
      nodes.answerInput.classList.add("shake");
      nodes.feedback.textContent = UI_TEXT[state.lang][reason] || UI_TEXT[state.lang].wrong;
    }

    async function shareResult() {
      const shareUrl = new URL(window.location.href);
      shareUrl.searchParams.set("lang", state.lang);
      const text = `${UI_TEXT[state.lang].title}: ${state.score}점`;
      if (navigator.share) {
        await navigator.share({ title: UI_TEXT[state.lang].title, text, url: shareUrl.href }).catch(() => {});
        return;
      }
      await copyResultLink();
    }

    async function copyResultLink() {
      const url = new URL(window.location.href);
      url.searchParams.set("lang", state.lang);
      url.hash = `score-${state.score}`;
      await navigator.clipboard?.writeText(url.href).catch(() => {
        const temp = document.createElement("textarea");
        temp.value = url.href;
        document.body.appendChild(temp);
        temp.select();
        document.execCommand("copy");
        temp.remove();
      });
      nodes.feedback.textContent = UI_TEXT[state.lang].copied;
      nodes.copyBtn.textContent = UI_TEXT[state.lang].copied;
      window.setTimeout(() => nodes.copyBtn.textContent = UI_TEXT[state.lang].copy, 1200);
    }

    nodes.korBtn.addEventListener("click", () => setLanguage("kor"));
    nodes.engBtn.addEventListener("click", () => setLanguage("eng"));
    nodes.startBtn.addEventListener("click", startGame);
    nodes.answerForm.addEventListener("submit", handleAnswerSubmit);
    nodes.retryBtn.addEventListener("click", startGame);
    nodes.shareBtn.addEventListener("click", shareResult);
    nodes.copyBtn.addEventListener("click", copyResultLink);

    resetGame();
    setLanguage(state.lang, false);
    loadWordData();
  </script>
</body>
</html>
